# Default values for file-server.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: docker.io/xinnj/file-server
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # runAsUser: 1000
  # fsGroup: 1000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: ""
  annotations:
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host:
      paths:
        - path: /fileserver
          pathType: ImplementationSpecific
        - path: /public
          pathType: ImplementationSpecific
        - path: /download
          pathType: ImplementationSpecific
        - path: /archive
          pathType: ImplementationSpecific
        - path: /secure-download
          pathType: ImplementationSpecific
        - path: /secure-archive
          pathType: ImplementationSpecific
        - path: /share-download
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources:
  limits:
    cpu: 2000m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

persistence:
  enabled: false
  ## Set annotations on pvc
  annotations: {}

  ## Specify an existing volume claim instead of creating a new one.
  ## When using this option all following options like storageClass, accessMode and size are ignored.
  # existingClaim:

  ## If defined, storageClassName: <storageClass>
  ## If set to "-", storageClassName: "", which disables dynamic provisioning
  ## If undefined (the default) or set to null, no storageClassName spec is
  ##   set, choosing the default provisioner.  (gp2 on AWS, standard on
  ##   GKE, AWS & OpenStack)
  ##
  storageClass:
  accessMode: ReadWriteOnce
  size: 5Gi

env:
  - name: TZ
    value: Asia/Shanghai
  - name: NGINX_LOG_LEVEL
    value: "notice"
  - name: URL_PREFIX
    value: /
  - name: TOKEN_EXPIRE_MINUTES
    value: "6"
  - name: REDIS_HOST
    value: "file-server-redis-master"
  - name: REDIS_PASSWORD
    value: "fileserver"
  - name: ADMIN_GROUP
    value: "/fileserver-admin"
  - name: GROUPS_CACHE_TTL
    value: "300"
  - name: PRIVATE
    value: "false"
  - name: ENABLE_CONCURRENT_CONTROL
    value: "true"
  - name: MAX_CONCURRENT_DOWNLOADS
    value: "5"
  - name: CONCURRENT_BURST
    value: "2"
  - name: CONCURRENT_DELAY
    value: "1"
  - name: LOGO_TEXT
    value: "My Files"

probe:
  path: /health

houseKeeping:
  schedule: "3 5 * * *"
  timeZone: Asia/Shanghai
  path: /data/download

redis:
  enabled: true
  global:
    imageRegistry: "docker.io"
    security:
      allowInsecureImages: true
  architecture: standalone
  auth:
    password: "fileserver"
  master:
    persistence:
      storageClass: ""