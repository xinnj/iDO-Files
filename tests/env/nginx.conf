worker_processes 1;

error_log  logs/error.log notice;
pid        logs/nginx.pid;

events {
    worker_connections 1024;
}

env PAGE_LIMIT;
env TOKEN_EXPIRE_MINUTES;
env REDIS_HOST;
env REDIS_PORT;
env REDIS_PASSWORD;
env ADMIN_GROUP;
env DATA_ROOT;
env AUTH_REQUIRED;
env LOGO_TEXT;
env OIDC_CLIENT_ID;
env OIDC_CLIENT_SECRET;
env OIDC_DISCOVERY_URL;
env OIDC_REDIRECT_URI;
env OIDC_LOGOUT_PATH;
env OIDC_LOGOUT_REDIRECT_URI;
env OIDC_SSL_VERIFY;
env GROUPS_CACHE_TTL;
env ENABLE_CONCURRENT_CONTROL;
env MAX_CONCURRENT_DOWNLOADS;
env CONCURRENT_BURST;
env CONCURRENT_DELAY;

http {
    include       /opt/homebrew/etc/openresty/mime.types;
    default_type  application/octet-stream;

    access_log off;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 0;

    # Lua paths: test env stubs first, then project lua, then LuaJIT rocks, then OpenResty defaults
    lua_package_path '/Users/xinnj/Documents/SRC/github/iDO-Files/tests/env/lua/?.lua;/Users/xinnj/Documents/SRC/github/iDO-Files/lua/?.lua;/Users/xinnj/.luarocks/share/lua/5.1/?.lua;;';
    lua_package_cpath '/Users/xinnj/.luarocks/lib/lua/5.1/?.so;;';

    lua_shared_dict auth_cache 10m;
    lua_shared_dict discovery 1m;
    lua_shared_dict concurrent_control 10m;

    server {
        listen 8080;
        server_name _;

        root /Users/xinnj/Documents/SRC/github/iDO-Files/tests/env/data;
        index .none;

        resolver 8.8.8.8 valid=10s;
        set $url_prefix /;

        error_page 401 /fileserver/401.html;
        error_page 403 /fileserver/403.html;
        error_page 429 /fileserver/429.html;

        set $concurrent_user_id "";

        location /health {
            return 200 "healthy\n";
        }

        location /fileserver {
        }

        location /fileserver/viewer {
            access_by_lua_block {
                local args = ngx.req.get_uri_args()
                local file_url = args["url"]
                if file_url then
                    local authorize = require("authorize")
                    if not authorize.authorize("GET", file_url) then
                        return ngx.exit(ngx.HTTP_FORBIDDEN)
                    end
                end
            }
            try_files $uri /fileserver/viewer.html;
        }

        location /fileserver/login {
            access_by_lua_block {
                require("oidc").authenticate(false)
            }
        }

        location /fileserver/logout {
            access_by_lua_block {
                require("oidc").authenticate(false)
            }
        }

        location ~ ^/fileserver/gen-time-token {
            content_by_lua_block {
                require("time-token").generate()
            }
            access_by_lua_block {
                local args = ngx.req.get_uri_args()
                if args["share-token"] and args["path"] then
                    require("share-token").authorizeGenTimeToken(args["share-token"], args["path"])
                else
                    require("oidc").authenticate(false)
                end
            }
        }

        location ~ ^/fileserver/gen-access-token {
            if ($request_method = POST) {
                content_by_lua_block {
                    require("access-token").generate()
                }
            }
            if ($request_method = GET) {
                content_by_lua_block {
                    require("access-token").list()
                }
            }
            if ($request_method = DELETE) {
                content_by_lua_block {
                    require("access-token").delete()
                }
            }
            access_by_lua_block {
                require("oidc").authenticate(false)
            }
        }

        location ~ ^/fileserver/gen-share-token {
            if ($request_method = POST) {
                content_by_lua_block {
                    require("share-token").generate()
                }
            }
            if ($request_method = GET) {
                content_by_lua_block {
                    require("share-token").list()
                }
            }
            if ($request_method = DELETE) {
                content_by_lua_block {
                    require("share-token").delete()
                }
            }
            access_by_lua_block {
                require("oidc").authenticate(false)
            }
        }

        location ~ ^/fileserver/auth-config {
            content_by_lua_file /Users/xinnj/Documents/SRC/github/iDO-Files/lua/auth-config.lua;
            access_by_lua_block {
                require("oidc").authenticate(false)
            }
        }

        location ~ ^/fileserver/admin-share-links {
            content_by_lua_file /Users/xinnj/Documents/SRC/github/iDO-Files/lua/admin-share-links.lua;
            access_by_lua_block {
                require("oidc").authenticate(false)
            }
        }

        location /_admin/housekeeping {
            content_by_lua_block {
                require("housekeeping").handle_request()
            }
        }

        location ~ ^/fileserver/housekeeping {
            content_by_lua_file /Users/xinnj/Documents/SRC/github/iDO-Files/lua/housekeeping-admin.lua;
            access_by_lua_block {
                require("oidc").authenticate(false)
            }
        }

        location ~ ^/fileserver/userinfo {
            content_by_lua_block {
                require("user_info").handle_endpoint()
            }
            access_by_lua_block {
                require("oidc").authenticate(true)
            }
        }

        location ~ ^/public(/.*)?$ {
            set $store_path /Users/xinnj/Documents/SRC/github/iDO-Files/tests/env/data/public$1;

            if ($request_method = POST) {
                access_by_lua_block {
                    local auth = require("authorize")
                    if not auth.authorize() then return ngx.exit(ngx.HTTP_FORBIDDEN) end
                }
                content_by_lua_file /Users/xinnj/Documents/SRC/github/iDO-Files/lua/upload.lua;
            }
            if ($request_method = DELETE) {
                access_by_lua_block {
                    local auth = require("authorize")
                    if not auth.authorize() then return ngx.exit(ngx.HTTP_FORBIDDEN) end
                }
                content_by_lua_file /Users/xinnj/Documents/SRC/github/iDO-Files/lua/delete.lua;
            }
            if ($request_method = PUT) {
                access_by_lua_block {
                    local auth = require("authorize")
                    if not auth.authorize() then return ngx.exit(ngx.HTTP_FORBIDDEN) end
                }
                content_by_lua_file /Users/xinnj/Documents/SRC/github/iDO-Files/lua/move-copy.lua;
            }

            if ($request_method = GET) {
                access_by_lua_block {
                    require("oidc").authenticate(true)
                    local concurrent = require("concurrent-control")
                    local can_start, err = concurrent.can_start_download()
                    if not can_start then
                        ngx.log(ngx.WARN, "Concurrent download limit exceeded: ", err)
                        return ngx.exit(ngx.HTTP_TOO_MANY_REQUESTS)
                    end
                }
                content_by_lua_file /Users/xinnj/Documents/SRC/github/iDO-Files/lua/handler.lua;
                log_by_lua_block {
                    local concurrent = require("concurrent-control")
                    concurrent.cleanup_download()
                }
            }
        }

        location ~ ^/download(/.*)?$ {
            set $store_path /Users/xinnj/Documents/SRC/github/iDO-Files/tests/env/data/download$1;

            access_by_lua_block {
                local authorize = require("authorize")
                if not authorize.authorize() then return ngx.exit(ngx.HTTP_FORBIDDEN) end

                if ngx.req.get_method() == "GET" then
                    local concurrent = require("concurrent-control")
                    local can_start, err = concurrent.can_start_download()
                    if not can_start then
                        ngx.log(ngx.WARN, "Concurrent download limit exceeded: ", err)
                        return ngx.exit(ngx.HTTP_TOO_MANY_REQUESTS)
                    end
                end
            }

            if ($request_method = POST) {
                content_by_lua_file /Users/xinnj/Documents/SRC/github/iDO-Files/lua/upload.lua;
            }
            if ($request_method = DELETE) {
                content_by_lua_file /Users/xinnj/Documents/SRC/github/iDO-Files/lua/delete.lua;
            }
            if ($request_method = PUT) {
                content_by_lua_file /Users/xinnj/Documents/SRC/github/iDO-Files/lua/move-copy.lua;
            }

            if ($request_method = GET) {
                content_by_lua_file /Users/xinnj/Documents/SRC/github/iDO-Files/lua/handler.lua;
                log_by_lua_block {
                    local concurrent = require("concurrent-control")
                    concurrent.cleanup_download()
                }
            }
        }

        location ~ ^/internal-download(/.*)?$ {
            content_by_lua_file /Users/xinnj/Documents/SRC/github/iDO-Files/lua/handler.lua;
        }

        location ~ ^/archive(/.*)?$ {
            set $store_path /Users/xinnj/Documents/SRC/github/iDO-Files/tests/env/data/archive$1;

            access_by_lua_block {
                local authorize = require("authorize")
                if not authorize.authorize() then return ngx.exit(ngx.HTTP_FORBIDDEN) end

                if ngx.req.get_method() == "GET" then
                    local concurrent = require("concurrent-control")
                    local can_start, err = concurrent.can_start_download()
                    if not can_start then
                        ngx.log(ngx.WARN, "Concurrent download limit exceeded: ", err)
                        return ngx.exit(ngx.HTTP_TOO_MANY_REQUESTS)
                    end
                end
            }

            if ($request_method = POST) {
                content_by_lua_file /Users/xinnj/Documents/SRC/github/iDO-Files/lua/upload.lua;
            }
            if ($request_method = DELETE) {
                content_by_lua_file /Users/xinnj/Documents/SRC/github/iDO-Files/lua/delete.lua;
            }
            if ($request_method = PUT) {
                content_by_lua_file /Users/xinnj/Documents/SRC/github/iDO-Files/lua/move-copy.lua;
            }

            if ($request_method = GET) {
                content_by_lua_file /Users/xinnj/Documents/SRC/github/iDO-Files/lua/handler.lua;
                log_by_lua_block {
                    local concurrent = require("concurrent-control")
                    concurrent.cleanup_download()
                }
            }
        }

        location ~ ^/internal-archive(/.*)?$ {
            content_by_lua_file /Users/xinnj/Documents/SRC/github/iDO-Files/lua/handler.lua;
        }

        location ~ ^/share {
            set $store_path "";
            set $file_name "";
            set $content_disposition "";
            set $share_token "";
            try_files $store_path =404;
            add_header Content-Disposition $content_disposition;
            access_by_lua_block {
                require("share-token").authorize()

                local concurrent = require("concurrent-control")
                local can_start, err = concurrent.can_start_download()
                if not can_start then
                    ngx.log(ngx.WARN, "Concurrent download limit exceeded: ", err)
                    return ngx.exit(ngx.HTTP_TOO_MANY_REQUESTS)
                end
            }
            body_filter_by_lua_block {
                require("share-token").body_filter()
            }
            log_by_lua_block {
                local concurrent = require("concurrent-control")
                concurrent.cleanup_download()
            }
        }

        location ~ ^/app {
            set $store_path "";
            set $file_name "";
            try_files $store_path =404;
            add_header Content-Disposition 'attachment; filename="$file_name"';
            access_by_lua_block {
                require("time-token").authorize()

                local concurrent = require("concurrent-control")
                local can_start, err = concurrent.can_start_download()
                if not can_start then
                    ngx.log(ngx.WARN, "Concurrent download limit exceeded: ", err)
                    return ngx.exit(ngx.HTTP_TOO_MANY_REQUESTS)
                end
            }
            log_by_lua_block {
                local concurrent = require("concurrent-control")
                concurrent.cleanup_download()
            }
        }
    }
}
