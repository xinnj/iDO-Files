name: Release

on:
  release:
    types: [ published ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Login Docker Hub
      run: "docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}"
    - name: Build the Docker image
      run: "docker build . --file Dockerfile --tag xinnj/file-server:${{ github.ref_name }} --tag xinnj/file-server:latest --build-arg VERSION=${{ github.ref_name }}"
    - name: Push the Docker image
      run: "docker push --all-tags xinnj/file-server"

    - name: Charts
      run: |
        helm package --version ${{ github.ref_name }} --app-version ${{ github.ref_name }} charts

    - name: Release
      uses: softprops/action-gh-release@v1
      with:
        files: file-server-${{ github.ref_name }}.tgz
