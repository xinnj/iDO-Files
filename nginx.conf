user  uploader;
worker_processes  4;

error_log  /var/log/nginx/error.log <NGINX_LOG_LEVEL>;
pid        /var/run/nginx.pid;

load_module modules/ndk_http_module.so;
load_module modules/ngx_http_lua_module.so;

events {
    worker_connections  1024;
}

env PAGE_LIMIT;
env TOKEN_EXPIRE_MINUTES;
env REDIS_HOST;
env REDIS_PORT;
env REDIS_PASSWORD;
env ADMIN_GROUP;
env DATA_ROOT;
env AUTH_REQUIRED;
env LOGO_TEXT;
env OIDC_CLIENT_ID;
env OIDC_CLIENT_SECRET;
env OIDC_DISCOVERY_URL;
env OIDC_REDIRECT_URI;
env OIDC_LOGOUT_PATH;
env OIDC_LOGOUT_REDIRECT_URI;
env OIDC_SSL_VERIFY;
env GROUPS_CACHE_TTL;
env ENABLE_CONCURRENT_CONTROL;
env MAX_CONCURRENT_DOWNLOADS;
env CONCURRENT_BURST;
env CONCURRENT_DELAY;

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  off;

    sendfile        on;
    #tcp_nopush     on;

    keepalive_timeout  65;

    #gzip  on;

    #include /etc/nginx/conf.d/*.conf;

    lua_package_path '/etc/nginx/lua/?.lua;;';
    lua_shared_dict auth_cache 10m;
    lua_shared_dict discovery 1m;
    lua_shared_dict concurrent_control 10m;

    init_worker_by_lua_block {
        require("lfs")
        _G.lfs = nil
    }

    client_max_body_size 0;

    server {
        listen       80;
        listen  [::]:80;
        server_name  _;

        #access_log  /var/log/nginx/host.access.log  main;

        root   /data;
        index .none;

        resolver <NAMESERVER> valid=10s;

        # URL prefix variable (set once, used in Lua)
        set $url_prefix <URL_PREFIX>;

        error_page 401 <URL_PREFIX>fileserver/401.html;
        error_page 403 <URL_PREFIX>fileserver/403.html;
        error_page 429 <URL_PREFIX>fileserver/429.html;

        # Concurrent download control variables
        set $concurrent_user_id "";

        location <URL_PREFIX>health {
          return 200 "healthy\n";
        }

        location /_admin/housekeeping {
            content_by_lua_block {
                require("housekeeping").handle_request()
            }
        }

        location ~ ^<URL_PREFIX>fileserver/housekeeping {
            content_by_lua_file lua/housekeeping-admin.lua;
            access_by_lua_block {
                require("oidc").authenticate(false)
            }
        }

        location <URL_PREFIX>fileserver {
        }

        location <URL_PREFIX>fileserver/viewer {
            access_by_lua_block {
                local args = ngx.req.get_uri_args()
                local file_url = args["url"]
                if file_url then
                    local authorize = require("authorize")
                    if not authorize.authorize("GET", file_url) then
                        return ngx.exit(ngx.HTTP_FORBIDDEN)
                    end
                end
            }
            try_files $uri <URL_PREFIX>fileserver/viewer.html;
        }

        location <URL_PREFIX>fileserver/login {
            access_by_lua_block {
                require("oidc").authenticate(false)
            }
        }
        location <URL_PREFIX>fileserver/logout {
            access_by_lua_block {
                require("oidc").authenticate(false)
            }
        }

        location ~ ^<URL_PREFIX>fileserver/gen-time-token {
            content_by_lua_block {
                require("time-token").generate()
            }
            access_by_lua_block {
                local args = ngx.req.get_uri_args()
                if args["share-token"] and args["path"]then
                    -- Use share-token authorization
                    require("share-token").authorizeGenTimeToken(args["share-token"], args["path"])
                else
                    -- Use original OIDC authentication
                    require("oidc").authenticate(false)
                end
            }
        }

        location ~ ^<URL_PREFIX>fileserver/gen-access-token {
            if ($request_method = POST ) {
                content_by_lua_block {
                require("access-token").generate()
                }
            }
            if ($request_method = GET ) {
                content_by_lua_block {
                require("access-token").list()
                }
            }
            if ($request_method = DELETE ) {
                content_by_lua_block {
                require("access-token").delete()
                }
            }
            access_by_lua_block {
                require("oidc").authenticate(false)
            }
        }

        location ~ ^<URL_PREFIX>fileserver/gen-share-token {
            if ($request_method = POST ) {
                content_by_lua_block {
                require("share-token").generate()
                }
            }
            if ($request_method = GET ) {
                content_by_lua_block {
                require("share-token").list()
                }
            }
            if ($request_method = DELETE ) {
                content_by_lua_block {
                require("share-token").delete()
                }
            }
            access_by_lua_block {
                require("oidc").authenticate(false)
            }
        }

        location ~ ^<URL_PREFIX>fileserver/auth-config {
            content_by_lua_file lua/auth-config.lua;
            access_by_lua_block {
                require("oidc").authenticate(false)
            }
        }

        location ~ ^<URL_PREFIX>fileserver/admin-share-links {
            content_by_lua_file lua/admin-share-links.lua;
            access_by_lua_block {
                require("oidc").authenticate(false)
            }
        }

        location ~ ^<URL_PREFIX>fileserver/userinfo {
            content_by_lua_block {
                require("user_info").handle_endpoint()
            }
            access_by_lua_block {
                require("oidc").authenticate(true)
            }
        }

        location ~ ^<URL_PREFIX>public(/.*)?$ {
            set $store_path /data<URL_PREFIX>public$1;
            if ($request_method = POST ) {
                access_by_lua_block {
                    local auth = require("authorize")
                    if not auth.authorize() then
                        return ngx.exit(ngx.HTTP_FORBIDDEN)
                    end
                }
                content_by_lua_file lua/upload.lua;
            }
            if ($request_method = DELETE ) {
                access_by_lua_block {
                    local auth = require("authorize")
                    if not auth.authorize() then
                        return ngx.exit(ngx.HTTP_FORBIDDEN)
                    end
                }
                content_by_lua_file lua/delete.lua;
            }
            if ($request_method = PUT ) {
                access_by_lua_block {
                    local auth = require("authorize")
                    if not auth.authorize() then
                        return ngx.exit(ngx.HTTP_FORBIDDEN)
                    end
                }
                content_by_lua_file lua/move-copy.lua;
            }
            
            # GET: Directory returns JSON list, file serves for download
            if ($request_method = GET ) {
                access_by_lua_block {
                    -- Check session optionally: keep login state if already logged in,
                    -- but treat as Guest if not authenticated (no forced redirect)
                    require("oidc").authenticate(true)

                    local concurrent = require("concurrent-control")
                    local can_start, err = concurrent.can_start_download()
                    if not can_start then
                        ngx.log(ngx.WARN, "Concurrent download limit exceeded: ", err)
                        return ngx.exit(ngx.HTTP_TOO_MANY_REQUESTS)
                    end
                }
                content_by_lua_file lua/handler.lua;
                log_by_lua_block {
                    local concurrent = require("concurrent-control")
                    concurrent.cleanup_download()
                }
            }
        }

        location ~ ^<URL_PREFIX>download(/.*)?$ {
            set $store_path /data<URL_PREFIX>download$1;
            access_by_lua_block {
                local authorize = require("authorize")
                if not authorize.authorize() then
                    return ngx.exit(ngx.HTTP_FORBIDDEN)
                end

                -- Only apply concurrent control for GET requests (downloads)
                if ngx.req.get_method() == "GET" then
                    local concurrent = require("concurrent-control")

                    -- Check if user can start download
                    local can_start, err = concurrent.can_start_download()
                    if not can_start then
                        ngx.log(ngx.WARN, "Concurrent download limit exceeded: ", err)
                        return ngx.exit(ngx.HTTP_TOO_MANY_REQUESTS)
                    end
                end
            }
            if ($request_method = POST ) {
                content_by_lua_file lua/upload.lua;
            }
            if ($request_method = DELETE ) {
                content_by_lua_file lua/delete.lua;
            }
            if ($request_method = PUT ) {
                content_by_lua_file lua/move-copy.lua;
            }
            
            # GET: Directory returns JSON list, file serves for download
            if ($request_method = GET ) {
                content_by_lua_file lua/handler.lua;
                log_by_lua_block {
                    local concurrent = require("concurrent-control")
                    concurrent.cleanup_download()
                }
            }
        }

        location ~ ^<URL_PREFIX>internal-download(/.*)?$ {
            content_by_lua_file lua/handler.lua;
        }

        location ~ ^<URL_PREFIX>archive(/.*)?$ {
            set $store_path /data<URL_PREFIX>archive$1;
            access_by_lua_block {
                local authorize = require("authorize")
                if not authorize.authorize() then
                    return ngx.exit(ngx.HTTP_FORBIDDEN)
                end

                -- Only apply concurrent control for GET requests (downloads)
                if ngx.req.get_method() == "GET" then
                    local concurrent = require("concurrent-control")

                    -- Check if user can start download
                    local can_start, err = concurrent.can_start_download()
                    if not can_start then
                        ngx.log(ngx.WARN, "Concurrent download limit exceeded: ", err)
                        return ngx.exit(ngx.HTTP_TOO_MANY_REQUESTS)
                    end
                end
            }
            if ($request_method = POST ) {
                content_by_lua_file lua/upload.lua;
            }
            if ($request_method = DELETE ) {
                content_by_lua_file lua/delete.lua;
            }
            if ($request_method = PUT ) {
                content_by_lua_file lua/move-copy.lua;
            }
            
            # GET: Directory returns JSON list, file serves for download
            if ($request_method = GET ) {
                content_by_lua_file lua/handler.lua;
                log_by_lua_block {
                    local concurrent = require("concurrent-control")
                    concurrent.cleanup_download()
                }
            }
        }

        location ~ ^<URL_PREFIX>internal-archive(/.*)?$ {
            content_by_lua_file lua/handler.lua;
        }

        # Authorized by token
        location ~ ^<URL_PREFIX>share {
            set $store_path "";
            set $file_name "";
            set $content_disposition "";
            set $share_token "";
            try_files $store_path =404;
            add_header Content-Disposition $content_disposition;
            access_by_lua_block {
                require("share-token").authorize()
                
                -- Then check concurrent control
                local concurrent = require("concurrent-control")
                local can_start, err = concurrent.can_start_download()
                if not can_start then
                    ngx.log(ngx.WARN, "Concurrent download limit exceeded: ", err)
                    return ngx.exit(ngx.HTTP_TOO_MANY_REQUESTS)
                end
            }
            
            body_filter_by_lua_block {
                require("share-token").body_filter()
            }
            
            # Cleanup after download completes
            log_by_lua_block {
                local concurrent = require("concurrent-control")
                concurrent.cleanup_download()
            }
        }

        location ~ ^<URL_PREFIX>app {
            set $store_path "";
            set $file_name "";
            try_files $store_path =404;
            add_header Content-Disposition 'attachment; filename="$file_name"';
            access_by_lua_block {
                require("time-token").authorize()
                
                -- Then check concurrent control
                local concurrent = require("concurrent-control")
                local can_start, err = concurrent.can_start_download()
                if not can_start then
                    ngx.log(ngx.WARN, "Concurrent download limit exceeded: ", err)
                    return ngx.exit(ngx.HTTP_TOO_MANY_REQUESTS)
                end
            }
            
            # Cleanup after download completes
            log_by_lua_block {
                local concurrent = require("concurrent-control")
                concurrent.cleanup_download()
            }
        }
    }
}
